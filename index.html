<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Runner Shooter Proto - Crowd Effect</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            color: #fff;
        }
        canvas {
            border: 2px solid #333;
            background: #1a1a1f;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 15px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div id="ui">Soldats: <span id="unitCount" style="color: #00E5FF;">1</span> | Gatling: <span id="gatlingStatus">OFF</span></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const unitCountEl = document.getElementById('unitCount');
const gatlingStatusEl = document.getElementById('gatlingStatus');

const width = Math.min(window.innerWidth, 400);
const height = Math.min(window.innerHeight, 700);
canvas.width = width;
canvas.height = height;

// --- ÉTAT DU JEU ---
let crowdCenter = { x: width / 2, y: height - 120 };
let units = []; // Tableau contenant la position de CHAQUE soldat du joueur
let gameOver = false;

let superBonusTimer = 0;
let lastShoot = 0;

let bullets = [];
let elements = [];

// Création d'un soldat individuel
function createUnit(offsetX = 0, offsetY = 0) {
    return {
        x: crowdCenter.x + offsetX,
        y: crowdCenter.y + offsetY,
        targetOffsetX: offsetX,
        targetOffsetY: offsetY,
        radius: 6
    };
}

// Repositionne tous les soldats en cercle compact autour du centre
function rearrangeCrowd() {
    const count = units.length;
    const spacing = 14;
    units.forEach((u, i) => {
        if (i === 0) {
            u.targetOffsetX = 0;
            u.targetOffsetY = 0;
        } else {
            // Disposition en spirale/cercle compact
            const angle = i * 0.8;
            const radius = Math.sqrt(i) * spacing;
            u.targetOffsetX = Math.cos(angle) * radius;
            u.targetOffsetY = Math.sin(angle) * radius;
        }
    });
}

// Ajouter des soldats
function addUnits(amount) {
    for (let i = 0; i < amount; i++) {
        // Apparition près du centre
        let rx = (Math.random() - 0.5) * 20;
        let ry = (Math.random() - 0.5) * 20;
        units.push(createUnit(rx, ry));
    }
    rearrangeCrowd();
}

// Initialisation du premier soldat
units.push(createUnit(0, 0));

// --- GENERATEUR DE VAGUES ---
function spawnWave(y) {
    const laneW = width / 2;

    // GAUCHE : Super Bonus (Gatling)
    elements.push({
        type: 'bonus',
        x: laneW / 2,
        y: y,
        r: 18
    });

    // DROITE : Porte multiplicatrice / addition
    elements.push({
        type: 'gate',
        x: laneW + 10,
        y: y + 80,
        w: laneW - 20,
        h: 40,
        val: 10
    });

    // DROITE : Obstacle mortel
    elements.push({
        type: 'obstacle',
        x: laneW + 20,
        y: y + 200,
        w: laneW - 40,
        h: 50,
        hp: 45
    });

    // DROITE : Horde massive d'ennemis rouges
    for (let r = 0; r < 10; r++) {
        for (let c = 0; c < 6; c++) {
            elements.push({
                type: 'enemy',
                x: laneW + 15 + c * 22,
                y: y + 300 + r * 22,
                r: 8
            });
        }
    }
}

// Initialisation de 3 vagues
spawnWave(-100);
spawnWave(-700);
spawnWave(-1300);

// --- CONTRÔLES ---
let isDown = false;
let lastX = 0;

function onStart(e) {
    isDown = true;
    lastX = e.touches ? e.touches[0].clientX : e.clientX;
    if (gameOver) resetGame();
}

function onMove(e) {
    if (!isDown || gameOver) return;
    const currentX = e.touches ? e.touches[0].clientX : e.clientX;
    const delta = currentX - lastX;
    crowdCenter.x += delta;
    crowdCenter.x = Math.max(30, Math.min(width - 30, crowdCenter.x));
    lastX = currentX;
}

function onEnd() { isDown = false; }

canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onEnd);
canvas.addEventListener('touchstart', onStart);
canvas.addEventListener('touchmove', onMove);
canvas.addEventListener('touchend', onEnd);

function resetGame() {
    crowdCenter = { x: width / 2, y: height - 120 };
    units = [createUnit(0, 0)];
    superBonusTimer = 0;
    bullets = [];
    elements = [];
    gameOver = false;
    spawnWave(-100);
    spawnWave(-700);
    spawnWave(-1300);
}

// --- BOUCLE DE JEU ---
function loop(now) {
    if (!gameOver) {
        update(now);
        render();
    } else {
        renderGameOver();
    }
    requestAnimationFrame(loop);
}

function update(now) {
    // 1. Décompte Gatling
    if (superBonusTimer > 0) {
        superBonusTimer--;
        gatlingStatusEl.textContent = "ON 🔥";
        gatlingStatusEl.style.color = "#FFD700";
    } else {
        gatlingStatusEl.textContent = "OFF";
        gatlingStatusEl.style.color = "#FFF";
    }

    // 2. Mise à jour de la position fluide de chaque soldat dans la foule
    units.forEach(u => {
        let targetX = crowdCenter.x + u.targetOffsetX;
        let targetY = crowdCenter.y + u.targetOffsetY;
        u.x += (targetX - u.x) * 0.2; // Smooth movement
        u.y += (targetY - u.y) * 0.2;
    });

    // 3. Tir automatique (Chaque soldat tire !)
    const fireRate = superBonusTimer > 0 ? 80 : 200;
    if (now - lastShoot > fireRate) {
        // En mode normal, max 12 tirs simulés pour ne pas faire ramer, ou 1 tir par soldat
        const shooterUnits = units.slice(0, 15); 
        shooterUnits.forEach(u => {
            if (superBonusTimer > 0) {
                bullets.push({ x: u.x, y: u.y - 10, vy: -14, dmg: 3, isGold: true });
            } else {
                bullets.push({ x: u.x, y: u.y - 10, vy: -10, dmg: 1, isGold: false });
            }
        });
        lastShoot = now;
    }

    // 4. Déplacement des balles
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.y += b.vy;

        // Collision balle vs obstacles/ennemis
        for (let j = elements.length - 1; j >= 0; j--) {
            let el = elements[j];

            if (el.type === 'obstacle' && b.x > el.x && b.x < el.x + el.w && b.y > el.y && b.y < el.y + el.h) {
                el.hp -= b.dmg;
                bullets.splice(i, 1);
                if (el.hp <= 0) elements.splice(j, 1);
                break;
            } 
            else if (el.type === 'enemy') {
                let dist = Math.hypot(b.x - el.x, b.y - el.y);
                if (dist < el.r + 4) {
                    elements.splice(j, 1);
                    bullets.splice(i, 1);
                    break;
                }
            }
        }

        if (b && b.y < 0) bullets.splice(i, 1);
    }

    // 5. Défilement du terrain & Collisions avec la FOULE
    const speed = 2.2;
    for (let i = elements.length - 1; i >= 0; i--) {
        let el = elements[i];
        el.y += speed;

        // Collision : SUPER BONUS (Gatling)
        if (el.type === 'bonus') {
            if (Math.hypot(crowdCenter.x - el.x, crowdCenter.y - el.y) < el.r + 25) {
                superBonusTimer = 400;
                elements.splice(i, 1);
                continue;
            }
        }

        // Collision : PORTE MULTIPLICATRICE
        if (el.type === 'gate' && crowdCenter.y < el.y + el.h && crowdCenter.y > el.y) {
            if (Math.abs(crowdCenter.x - (el.x + el.w / 2)) < el.w / 2) {
                addUnits(el.val); // Multiplie / ajoute physiquement des soldats !
                elements.splice(i, 1);
                continue;
            }
        }

        // Collision : OBSTACLE (Mortel si la foule rentre dedans)
        if (el.type === 'obstacle') {
            if (crowdCenter.x > el.x - 15 && crowdCenter.x < el.x + el.w + 15 &&
                crowdCenter.y > el.y && crowdCenter.y < el.y + el.h) {
                gameOver = true;
            }
        }

        // Collision : ENNEMI vs SOLDATS (Mêlée soldat par soldat)
        if (el.type === 'enemy') {
            for (let uIdx = units.length - 1; uIdx >= 0; uIdx--) {
                let u = units[uIdx];
                if (Math.hypot(u.x - el.x, u.y - el.y) < u.radius + el.r) {
                    units.splice(uIdx, 1); // Le soldat meurt
                    elements.splice(i, 1); // L'ennemi meurt
                    rearrangeCrowd();
                    if (units.length === 0) gameOver = true;
                    break;
                }
            }
        }

        // Nettoyage hors écran
        if (el.y > height + 100) elements.splice(i, 1);
    }

    // Mettre à jour l'IHM avec le nombre réel d'unités visibles
    unitCountEl.textContent = units.length;
}

function render() {
    ctx.clearRect(0, 0, width, height);

    // Ligne médiane (2 voies)
    ctx.strokeStyle = '#333';
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(width / 2, 0);
    ctx.lineTo(width / 2, height);
    ctx.stroke();
    ctx.setLineDash([]);

    // Dessin des éléments
    elements.forEach(el => {
        if (el.type === 'bonus') {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(el.x, el.y, el.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("GATL", el.x, el.y + 4);
        } 
        else if (el.type === 'gate') {
            ctx.fillStyle = 'rgba(0, 230, 118, 0.25)';
            ctx.fillRect(el.x, el.y, el.w, el.h);
            ctx.strokeStyle = '#00E676';
            ctx.lineWidth = 2;
            ctx.strokeRect(el.x, el.y, el.w, el.h);
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`+${el.val} Soldats`, el.x + el.w / 2, el.y + 25);
        }
        else if (el.type === 'obstacle') {
            ctx.fillStyle = '#D32F2F';
            ctx.fillRect(el.x, el.y, el.w, el.h);
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(el.hp, el.x + el.w / 2, el.y + el.h / 2 + 6);
        }
        else if (el.type === 'enemy') {
            ctx.fillStyle = '#FF1744';
            ctx.beginPath();
            ctx.arc(el.x, el.y, el.r, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // Dessin des balles
    bullets.forEach(b => {
        ctx.fillStyle = b.isGold ? '#FFD700' : '#00E5FF';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.isGold ? 3.5 : 2.5, 0, Math.PI * 2);
        ctx.fill();
    });

    // Dessin de CHAQUE SOLDAT de la foule (Bleus ou Dorés en Gatling)
    units.forEach(u => {
        ctx.fillStyle = superBonusTimer > 0 ? '#FFD700' : '#00B0FF';
        ctx.beginPath();
        ctx.arc(u.x, u.y, u.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 1;
        ctx.stroke();
    });
}

function renderGameOver() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 30px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText("GAME OVER", width / 2, height / 2 - 20);
    ctx.font = '16px sans-serif';
    ctx.fillText("Touche l'écran pour rejouer", width / 2, height / 2 + 20);
}

// Lancement
requestAnimationFrame(loop);
</script>
</body>
</html>
