<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Runner Shooter</title>
    <style>
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body {
            margin: 0; padding: 0; background: #0f0f13;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; font-family: system-ui, sans-serif;
        }
        canvas {
            border: 2px solid #2a2a35;
            background: #181820;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        #ui {
            position: absolute; top: 15px; font-size: 18px; font-weight: bold;
            color: #fff; pointer-events: none; text-shadow: 0 2px 4px #000;
        }
    </style>
</head>
<body>

<div id="ui">Soldats: <span id="unitCount" style="color:#00E5FF">1</span> | Gatling: <span id="gatlingStatus">OFF</span></div>
<canvas id="gameCanvas"></canvas>

<script src="sprites.js"></script>
<script src="game.js"></script>
</body>
</html>
