<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Runner Shooter Proto - Fix</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            color: #fff;
        }
        canvas {
            border: 2px solid #333;
            background: #1a1a1f;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 15px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div id="ui">Unités: <span id="unitCount">1</span> | Gatling: <span id="gatlingStatus">OFF</span></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const unitCountEl = document.getElementById('unitCount');
const gatlingStatusEl = document.getElementById('gatlingStatus');

const width = Math.min(window.innerWidth, 400);
const height = Math.min(window.innerHeight, 700);
canvas.width = width;
canvas.height = height;

// --- ÉTAT DU JEU ---
let playerCount = 1;
let playerX = width / 2;
let playerY = height - 100;
let gameOver = false;

let superBonusTimer = 0; // Si > 0, Gatling active
let lastShoot = 0;

let bullets = [];
let elements = [];

// --- GENERATEUR DE VAGUES ---
function spawnWave(y) {
    const laneW = width / 2;

    // GAUCHE : Super Bonus (Gatling)
    elements.push({
        type: 'bonus',
        x: laneW / 2,
        y: y,
        r: 18
    });

    // DROITE : Porte bonus
    elements.push({
        type: 'gate',
        x: laneW + 10,
        y: y + 80,
        w: laneW - 20,
        h: 40,
        val: 5
    });

    // DROITE : Obstacle mortel
    elements.push({
        type: 'obstacle',
        x: laneW + 20,
        y: y + 200,
        w: laneW - 40,
        h: 50,
        hp: 30
    });

    // DROITE : Horde massive d'ennemis
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 5; c++) {
            elements.push({
                type: 'enemy',
                x: laneW + 20 + c * 25,
                y: y + 300 + r * 25,
                r: 9
            });
        }
    }
}

// Initialisation de 3 vagues
spawnWave(-100);
spawnWave(-700);
spawnWave(-1300);

// --- CONTRÔLES ---
let isDown = false;
let lastX = 0;

function onStart(e) {
    isDown = true;
    lastX = e.touches ? e.touches[0].clientX : e.clientX;
    if (gameOver) resetGame();
}

function onMove(e) {
    if (!isDown || gameOver) return;
    const currentX = e.touches ? e.touches[0].clientX : e.clientX;
    const delta = currentX - lastX;
    playerX += delta;
    playerX = Math.max(25, Math.min(width - 25, playerX));
    lastX = currentX;
}

function onEnd() { isDown = false; }

canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onEnd);
canvas.addEventListener('touchstart', onStart);
canvas.addEventListener('touchmove', onMove);
canvas.addEventListener('touchend', onEnd);

function resetGame() {
    playerCount = 1;
    playerX = width / 2;
    superBonusTimer = 0;
    bullets = [];
    elements = [];
    gameOver = false;
    spawnWave(-100);
    spawnWave(-700);
    spawnWave(-1300);
}

// --- BOUCLE DE JEU ---
function loop(now) {
    if (!gameOver) {
        update(now);
        render();
    } else {
        renderGameOver();
    }
    requestAnimationFrame(loop);
}

function update(now) {
    // 1. Décompte Gatling
    if (superBonusTimer > 0) {
        superBonusTimer--;
        gatlingStatusEl.textContent = "ON 🔥";
        gatlingStatusEl.style.color = "#FFD700";
    } else {
        gatlingStatusEl.textContent = "OFF";
        gatlingStatusEl.style.color = "#FFF";
    }

    // 2. Tir automatique
    const fireRate = superBonusTimer > 0 ? 60 : 180; // Plus rapide en Gatling
    if (now - lastShoot > fireRate) {
        if (superBonusTimer > 0) {
            // Tirs Gatling en éventail
            bullets.push({ x: playerX - 10, y: playerY - 15, vy: -12, dmg: 2 });
            bullets.push({ x: playerX, y: playerY - 20, vy: -14, dmg: 3 });
            bullets.push({ x: playerX + 10, y: playerY - 15, vy: -12, dmg: 2 });
        } else {
            // Tir standard
            bullets.push({ x: playerX, y: playerY - 15, vy: -9, dmg: 1 });
        }
        lastShoot = now;
    }

    // 3. Déplacement des balles
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.y += b.vy;

        // Collision balle vs obstacles/ennemis
        for (let j = elements.length - 1; j >= 0; j--) {
            let el = elements[j];

            if (el.type === 'obstacle' && b.x > el.x && b.x < el.x + el.w && b.y > el.y && b.y < el.y + el.h) {
                el.hp -= b.dmg;
                bullets.splice(i, 1);
                if (el.hp <= 0) elements.splice(j, 1);
                break;
            } 
            else if (el.type === 'enemy') {
                let dist = Math.hypot(b.x - el.x, b.y - el.y);
                if (dist < el.r + 4) {
                    elements.splice(j, 1);
                    bullets.splice(i, 1);
                    break;
                }
            }
        }

        if (b && b.y < 0) bullets.splice(i, 1);
    }

    // 4. Défilement du terrain & Collisions Joueur
    const speed = 2.2;
    for (let i = elements.length - 1; i >= 0; i--) {
        let el = elements[i];
        el.y += speed;

        // Collision : SUPER BONUS
        if (el.type === 'bonus') {
            if (Math.hypot(playerX - el.x, playerY - el.y) < el.r + 20) {
                superBonusTimer = 400; // ~6-7 secondes
                elements.splice(i, 1);
                continue;
            }
        }

        // Collision : PORTE
        if (el.type === 'gate' && playerY < el.y + el.h && playerY > el.y) {
            if (Math.abs(playerX - (el.x + el.w / 2)) < el.w / 2) {
                playerCount += el.val;
                elements.splice(i, 1);
                continue;
            }
        }

        // Collision : OBSTACLE (Mortel !)
        if (el.type === 'obstacle' && playerX > el.x && playerX < el.x + el.w && playerY > el.y && playerY < el.y + el.h) {
            gameOver = true;
        }

        // Collision : ENNEMI
        if (el.type === 'enemy') {
            if (Math.hypot(playerX - el.x, playerY - el.y) < el.r + 15) {
                playerCount--;
                elements.splice(i, 1);
                if (playerCount <= 0) gameOver = true;
                continue;
            }
        }

        // Nettoyage hors écran
        if (el.y > height + 100) elements.splice(i, 1);
    }

    // Mettre à jour l'IHM
    unitCountEl.textContent = playerCount;
}

function render() {
    ctx.clearRect(0, 0, width, height);

    // Ligne médiane (2 voies)
    ctx.strokeStyle = '#333';
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(width / 2, 0);
    ctx.lineTo(width / 2, height);
    ctx.stroke();
    ctx.setLineDash([]);

    // Dessin des éléments
    elements.forEach(el => {
        if (el.type === 'bonus') {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(el.x, el.y, el.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("GATL", el.x, el.y + 4);
        } 
        else if (el.type === 'gate') {
            ctx.fillStyle = 'rgba(0, 230, 118, 0.25)';
            ctx.fillRect(el.x, el.y, el.w, el.h);
            ctx.strokeStyle = '#00E676';
            ctx.strokeRect(el.x, el.y, el.w, el.h);
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`+${el.val} Unités`, el.x + el.w / 2, el.y + 25);
        }
        else if (el.type === 'obstacle') {
            ctx.fillStyle = '#D32F2F';
            ctx.fillRect(el.x, el.y, el.w, el.h);
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(el.hp, el.x + el.w / 2, el.y + el.h / 2 + 6);
        }
        else if (el.type === 'enemy') {
            ctx.fillStyle = '#FF1744';
            ctx.beginPath();
            ctx.arc(el.x, el.y, el.r, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // Dessin des balles
    ctx.fillStyle = superBonusTimer > 0 ? '#FFD700' : '#00E5FF';
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
    });

    // Dessin du joueur
    ctx.fillStyle = superBonusTimer > 0 ? '#FFD700' : '#29B6F6';
    ctx.beginPath();
    ctx.arc(playerX, playerY, 16, 0, Math.PI * 2);
    ctx.fill();
}

function renderGameOver() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 30px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText("GAME OVER", width / 2, height / 2 - 20);
    ctx.font = '16px sans-serif';
    ctx.fillText("Clique ou touche l'écran pour rejouer", width / 2, height / 2 + 20);
}

// Lancement
requestAnimationFrame(loop);
</script>
</body>
</html>
